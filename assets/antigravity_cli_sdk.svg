<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <clipPath id="hexClip">
      <polygon points="100,4 183.14,52 183.14,148 100,196 16.86,148 16.86,52"/>
    </clipPath>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#090d19"/>
      <stop offset="48%" stop-color="#132235"/>
      <stop offset="100%" stop-color="#102f31"/>
    </linearGradient>
    <linearGradient id="rim" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#88d8ff"/>
      <stop offset="52%" stop-color="#b7f36b"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="orbit" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#88d8ff"/>
      <stop offset="45%" stop-color="#b7f36b"/>
      <stop offset="100%" stop-color="#f8fbff"/>
    </linearGradient>
    <linearGradient id="prompt" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#b7f36b"/>
      <stop offset="100%" stop-color="#88d8ff"/>
    </linearGradient>
    <radialGradient id="core" cx="50%" cy="45%" r="52%">
      <stop offset="0%" stop-color="#88d8ff" stop-opacity="0.34"/>
      <stop offset="100%" stop-color="#88d8ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="fineGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <polygon points="100,4 183.14,52 183.14,148 100,196 16.86,148 16.86,52"
           fill="url(#bg)" stroke="url(#rim)" stroke-width="2.5" stroke-linejoin="round"/>

  <g clip-path="url(#hexClip)">
    <ellipse cx="100" cy="88" rx="70" ry="64" fill="url(#core)" filter="url(#softGlow)"/>

    <g opacity="0.1" stroke="#dfffc1" stroke-width="0.55">
      <path d="M38 67h124"/>
      <path d="M31 101h138"/>
      <path d="M42 135h116"/>
      <path d="M68 39l64 122"/>
      <path d="M132 39L68 161"/>
    </g>

    <g transform="translate(100 90)" fill="none" filter="url(#fineGlow)">
      <ellipse rx="62" ry="18" stroke="url(#orbit)" stroke-width="2.3"
               transform="rotate(-18)" opacity="0.72"/>
      <ellipse rx="52" ry="15" stroke="#88d8ff" stroke-width="1.5"
               transform="rotate(22)" opacity="0.5"/>
      <ellipse rx="40" ry="11" stroke="#b7f36b" stroke-width="1.2"
               transform="rotate(-62)" opacity="0.42"/>
    </g>

    <g filter="url(#fineGlow)">
      <circle cx="100" cy="90" r="19" fill="#09101a" stroke="url(#orbit)" stroke-width="2"/>
      <path d="M91 101l9-27 9 27m-14-9h10" fill="none" stroke="#f8fbff"
            stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="150" cy="72" r="4" fill="#b7f36b"/>
      <circle cx="55" cy="107" r="3.3" fill="#88d8ff"/>
      <circle cx="126" cy="124" r="2.8" fill="#f8fbff"/>
    </g>

    <g transform="translate(51 139)" filter="url(#fineGlow)">
      <rect x="0" y="0" width="98" height="30" rx="7" fill="#09101a" opacity="0.72"
            stroke="#88d8ff" stroke-opacity="0.42"/>
      <path d="M16 9l9 6-9 6" fill="none" stroke="url(#prompt)" stroke-width="3"
            stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="36" y1="21" x2="70" y2="21" stroke="#b7f36b" stroke-width="2.6"
            stroke-linecap="round"/>
      <circle cx="84" cy="15" r="2.1" fill="#88d8ff"/>
    </g>

    <g opacity="0.52" fill="#f8fbff" filter="url(#fineGlow)">
      <circle cx="46" cy="71" r="1.3"/>
      <circle cx="154" cy="105" r="1.1"/>
      <circle cx="78" cy="37" r="1.2"/>
      <circle cx="128" cy="163" r="1"/>
      <circle cx="39" cy="132" r="0.9"/>
    </g>
  </g>
</svg>
